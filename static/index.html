<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css" />

    <script src="main.js"></script>
  </head>
  <body>
    <div class="login" id="login">
      <table>
        <tr>
          <td>Username:</td>
          <td><input id="username" type="text" /></td>
        </tr>
        <tr>
          <td>Room ID:</td>
          <td><input id="roomid" type="text" /></td>
          <td><button id="open">Join Room</button></td>
          <td><button id="create">Create Room</button></td>
        </tr>
      </table>
    </div>

    <div class="blocker" id="blocker"></div>

    <div class="container">
      <div class="chat-header">
        <img src="img/goat-icon.png" />
        <p>Goat Chat</p>
      </div>
      <div class="chat-box" id="output"></div>
      <div class="message-box">
        <input id="input" type="text" />
        <button id="send">Send</button>
      </div>
    </div>
  </body>
</html>
